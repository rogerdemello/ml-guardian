<svg xmlns="http://www.w3.org/2000/svg" width="860" height="470" viewBox="0 0 860 470" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="860" height="470" rx="16" fill="#fcfcfb"/>
  <style>
    .box { fill:#ffffff; stroke:#d9d8d2; stroke-width:1.5; rx:10; }
    .accent { fill:#eaf2fd; stroke:#2a78d6; }
    .warn { fill:#fdeee8; stroke:#d3663a; }
    .store { fill:#eef7ef; stroke:#0ca30c; }
    .t { fill:#0b0b0b; font-size:14px; font-weight:600; }
    .s { fill:#52514e; font-size:11.5px; }
    .lbl { fill:#898781; font-size:11px; font-weight:600; letter-spacing:.04em; }
    .arr { stroke:#898781; stroke-width:1.6; marker-end:url(#a); fill:none; }
  </style>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#898781"/></marker>
  </defs>

  <text x="28" y="34" class="t" font-size="16">ML Guardian — architecture</text>

  <!-- Browser -->
  <rect class="box accent" x="28" y="70" width="200" height="64" rx="10"/>
  <text x="44" y="98" class="t">Dashboard</text>
  <text x="44" y="118" class="s">vanilla JS · served at /</text>

  <!-- FastAPI -->
  <rect class="box accent" x="330" y="70" width="200" height="64" rx="10"/>
  <text x="346" y="98" class="t">FastAPI</text>
  <text x="346" y="118" class="s">/api · scan, incidents…</text>

  <!-- Services column -->
  <text x="330" y="176" class="lbl">SERVICES</text>
  <rect class="box" x="330" y="186" width="200" height="46" rx="9"/>
  <text x="346" y="214" class="t" font-size="13">Risk detector</text>
  <rect class="box warn" x="330" y="240" width="200" height="46" rx="9"/>
  <text x="346" y="268" class="t" font-size="13">Orchestrator · Gemini</text>
  <rect class="box" x="330" y="294" width="200" height="46" rx="9"/>
  <text x="346" y="322" class="t" font-size="13">Metadata writer</text>
  <rect class="box" x="330" y="348" width="200" height="46" rx="9"/>
  <text x="346" y="376" class="t" font-size="13">Remediation · sqlglot</text>

  <!-- DataHub client -->
  <rect class="box" x="600" y="186" width="230" height="64" rx="10"/>
  <text x="616" y="214" class="t">DataHubClient</text>
  <text x="616" y="234" class="s">one interface, two backends</text>

  <rect class="box store" x="600" y="266" width="110" height="56" rx="9"/>
  <text x="616" y="291" class="t" font-size="12.5">Fixture</text>
  <text x="616" y="309" class="s">offline</text>

  <rect class="box warn" x="720" y="266" width="110" height="56" rx="9"/>
  <text x="736" y="291" class="t" font-size="12.5">MCP / SDK</text>
  <text x="736" y="309" class="s">live DataHub</text>

  <!-- SQLite -->
  <rect class="box store" x="330" y="410" width="200" height="44" rx="9"/>
  <text x="346" y="437" class="t" font-size="13">SQLite — incidents · actions</text>

  <!-- arrows -->
  <path class="arr" d="M228,102 L326,102"/>
  <path class="arr" d="M430,138 L430,182"/>
  <path class="arr" d="M530,209 L596,209"/>
  <path class="arr" d="M430,394 L430,406"/>
  <path class="arr" d="M655,250 L655,262"/>

  <text x="600" y="360" class="s">Write-back: tags + glossary terms</text>
  <text x="600" y="378" class="s">Reads: schema · lineage · signals</text>
</svg>
